<div class="container">
  <div class="card border-light shadow-sm card-first">
    <div class="card-body">
      <h3>Videos Uploaded</h3>

      <div *ngIf="videos.length > 0" class="table-responsive">
        <table class="table table-bordered table-striped table-hover">
          <thead class="table-dark">
            <tr>
              <th scope="col">S.No</th>
              <th scope="col">Name</th>
              <th scope="col">Download</th>
              <th scope="col">Uploaded On</th>
              <th scope="col">Delete</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let video of videos; let i = index">
              <th scope="row">{{ i + 1 }}</th>
              <td>{{ video.file_name }}</td>
              <td>
                <a
                  class="btn btn-primary btn-sm"
                  [href]="video.file_link"
                  target="_blank"
                >
                  Download
                  <span class="fa-solid fa-download"></span>
                </a>
              </td>
              <td>{{ video.time_stamp }}</td>
              <td>
                <button
                  class="btn btn-danger btn-sm"
                  (click)="deleteVideo(video.unique_id)"
                >
                  Delete
                  <span class="fa-solid fa-trash"></span>
                </button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- Fallback if no videos are found -->
      <div *ngIf="videos.length === 0" class="text-center mt-4">
        <p>No videos here yet. Upload one to see it displayed.</p>
      </div>
    </div>
  </div>
</div>
