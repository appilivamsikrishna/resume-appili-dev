<div class="landing-container">
  <section class="hero">
    <h1>Welcome to the CDN Project</h1>
    <p>Effortlessly manage and deliver your content with our CDN interface.</p>
    <button (click)="navigateToUpload()">Get Started</button>
  </section>

  <section class="features">
    <h2>Features</h2>
    <div class="feature-list">
      <div class="feature-item">
        <h3>Upload Files</h3>
        <p>Select and upload multiple files at once.</p>
      </div>
      <div class="feature-item">
        <h3>Manage Files</h3>
        <p>View and delete uploaded files.</p>
      </div>
      <div class="feature-item">
        <h3>Seamless Delivery</h3>
        <p>Access uploaded files via public URLs.</p>
      </div>
    </div>
  </section>
</div>
