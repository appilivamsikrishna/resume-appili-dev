<div class="upload-container">
  <input type="file" (change)="filesSelected($event)" multiple />
  <button (click)="uploadFiles()">Upload All</button>

  <div class="uploaded-files" *ngIf="downloadURLs.length > 0">
    <p *ngFor="let url of downloadURLs">
      <a [href]="url" target="_blank">View Uploaded File</a>
      <button (click)="deleteFile(url)">Delete</button>
    </p>
  </div>
</div>
